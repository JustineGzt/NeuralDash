# Nginx reverse proxy durci pour backend Node.js
# Adapter server_name, chemins SSL et upstream selon ton infra.

user nginx;
worker_processes auto;

events {
  worker_connections 1024;
  multi_accept on;
}

http {
  include mime.types;
  default_type application/octet-stream;

  # Limites de ressources anti-DoS
  client_max_body_size 1m;
  client_body_timeout 10s;
  client_header_timeout 10s;
  send_timeout 10s;
  keepalive_timeout 15s;
  keepalive_requests 100;

  # Buffer limits
  client_body_buffer_size 16k;
  client_header_buffer_size 1k;
  large_client_header_buffers 2 1k;

  # Reverse proxy hardening
  server_tokens off;
  reset_timedout_connection on;

  # JSON logs pour SIEM
  log_format siem_json escape=json
    '{"ts":"$time_iso8601",'
    '"remote_addr":"$remote_addr",'
    '"request_id":"$request_id",'
    '"method":"$request_method",'
    '"uri":"$request_uri",'
    '"status":$status,'
    '"bytes_sent":$body_bytes_sent,'
    '"request_time":$request_time,'
    '"upstream_time":"$upstream_response_time",'
    '"referer":"$http_referer",'
    '"ua":"$http_user_agent",'
    '"xff":"$http_x_forwarded_for"}';

  access_log /var/log/nginx/access-siem.log siem_json;
  error_log /var/log/nginx/error.log warn;

  # Rate limiting: 10 req/s avec burst court
  limit_req_zone $binary_remote_addr zone=api_rate_limit:10m rate=10r/s;
  # Limite de connexions simultanees par IP
  limit_conn_zone $binary_remote_addr zone=ip_conn_limit:10m;

  upstream progression_backend {
    server 127.0.0.1:3001 max_fails=3 fail_timeout=30s;
    keepalive 32;
  }

  # HTTP: uniquement ACME + healthcheck + redirection HTTPS
  server {
    listen 80;
    server_name progression.example.com;

    location ^~ /.well-known/acme-challenge/ {
      root /var/www/certbot;
      default_type text/plain;
      try_files $uri =404;
    }

    # Health endpoint local
    location = /healthz {
      access_log off;
      return 200 'ok';
      add_header Content-Type text/plain;
    }

    location / {
      return 301 https://$host$request_uri;
    }
  }

  # HTTPS: terminaison TLS + reverse proxy backend
  server {
    listen 443 ssl http2;
    server_name progression.example.com;

    ssl_certificate /etc/letsencrypt/live/progression.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/progression.example.com/privkey.pem;

    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;
    ssl_session_tickets off;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;

    # Certbot renewals over HTTP are preferred, but this avoids accidental breakage.
    location ^~ /.well-known/acme-challenge/ {
      root /var/www/certbot;
      default_type text/plain;
      try_files $uri =404;
    }

    # Health endpoint local
    location = /healthz {
      access_log off;
      return 200 'ok';
      add_header Content-Type text/plain;
    }

    location / {
      limit_req zone=api_rate_limit burst=20 nodelay;
      limit_conn ip_conn_limit 20;

      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto https;
      proxy_set_header X-Request-ID $request_id;

      proxy_connect_timeout 3s;
      proxy_send_timeout 10s;
      proxy_read_timeout 10s;

      proxy_pass http://progression_backend;
    }
  }
}
